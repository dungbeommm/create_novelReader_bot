name: Text to Speech (Piper - Ngoc Huyen)
run-name: TTS ${{ inputs.filename }}

on:
  workflow_dispatch:
    inputs:
      text:
        description: Van ban can doc
        required: true
        type: string
      filename:
        description: Ten file output
        required: true
        default: output
        type: string
      length_scale:
        description: Toc do (lon hon = cham hon)
        required: true
        default: "1.0"
        type: string
      upload_ia:
        description: Dang tai len archive.org
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  synthesize:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      INPUT_TEXT: ${{ inputs.text }}
      INPUT_FILENAME: ${{ inputs.filename }}
      INPUT_LENGTH_SCALE: ${{ inputs.length_scale }}
      IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
      IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: pip install --requirement requirements.txt requests
      - name: Synthesize
        shell: bash
        run: |
          safe_name="$(printf '%s' "$INPUT_FILENAME" | sed 's/[^A-Za-z0-9._-]/_/g' | cut -c1-100)"
          test -n "$safe_name" || safe_name=output
          python synth.py --text "$INPUT_TEXT" --out "${safe_name}.wav" --length-scale "$INPUT_LENGTH_SCALE"
          echo "OUTPUT_FILE=${safe_name}.wav" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: piper-audio
          path: ${{ env.OUTPUT_FILE }}
          if-no-files-found: error
      - name: Upload to Internet Archive
        if: ${{ inputs.upload_ia }}
        shell: bash
        run: |
          test -n "$IA_ACCESS_KEY" || { echo "Missing IA_ACCESS_KEY secret"; exit 2; }
          base="$(basename "$OUTPUT_FILE" .wav)"
          ident="piper-tts-${base}-${GITHUB_RUN_ID}"
          python pipeline/ia_upload.py upload \
            --identifier "$ident" \
            --file "$OUTPUT_FILE" \
            --make-bucket \
            --title "Piper TTS ${base}" \
            --creator "Piper TTS (Ngoc Huyen)" \
            --language vie \
            --description "Tao boi Piper TTS workflow (giong Ngoc Huyen)."
          echo "Link: https://archive.org/details/$ident" >> "$GITHUB_STEP_SUMMARY"
