name: Text to Speech (Piper - Ngoc Huyen)
run-name: TTS ${{ inputs.filename }}

on:
  workflow_dispatch:
    inputs:
      text:
        description: Van ban can doc
        required: true
        type: string
      filename:
        description: Ten file output
        required: true
        default: output
        type: string
      length_scale:
        description: Toc do (lon hon = cham hon)
        required: true
        default: "1.0"
        type: string
      make_release:
        description: Tao GitHub Release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  synthesize:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      INPUT_TEXT: ${{ inputs.text }}
      INPUT_FILENAME: ${{ inputs.filename }}
      INPUT_LENGTH_SCALE: ${{ inputs.length_scale }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: pip install --requirement requirements.txt
      - name: Synthesize
        shell: bash
        run: |
          safe_name="$(printf '%s' "$INPUT_FILENAME" | sed 's/[^A-Za-z0-9._-]/_/g' | cut -c1-100)"
          test -n "$safe_name" || safe_name=output
          python synth.py --text "$INPUT_TEXT" --out "${safe_name}.wav" --length-scale "$INPUT_LENGTH_SCALE"
          echo "OUTPUT_FILE=${safe_name}.wav" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: piper-audio
          path: ${{ env.OUTPUT_FILE }}
          if-no-files-found: error
      - name: Create release
        if: ${{ inputs.make_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="tts-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gh release create "$tag" "$OUTPUT_FILE" --title "Piper TTS ${GITHUB_RUN_ID}" --notes "Generated by Piper TTS workflow."
