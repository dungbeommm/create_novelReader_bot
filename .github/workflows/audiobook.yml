name: Ebook to Audiobook
run-name: Audiobook ${{ inputs.job_id }}

on:
  workflow_dispatch:
    inputs:
      job_id: {description: Job ID, required: true, type: string}
      title: {description: Ten truyen, required: false, default: audiobook, type: string}
      format: {description: Dinh dang, required: false, default: mp3, type: choice, options: [mp3, m4b, wav, ogg, opus]}
      length_scale: {description: Toc do, required: false, default: "1.0", type: string}
      package: {description: Cach dong goi, required: false, default: auto, type: choice, options: [auto, zip, single, files]}
      max_chars: {description: Gioi han ky tu moi phan, required: false, default: "0", type: string}
      start: {description: Chuong bat dau, required: false, default: "1", type: string}
      limit: {description: So chuong, required: false, default: "0", type: string}
      batch_size: {description: So chuong moi ZIP, required: false, default: "0", type: string}
      install_calibre: {description: Cai Calibre, required: false, default: "false", type: choice, options: ["false", "true"]}

permissions:
  contents: write

env:
  JOB_ID: ${{ inputs.job_id }}
  BOOK_TITLE: ${{ inputs.title }}
  AUDIO_FORMAT: ${{ inputs.format }}
  LENGTH_SCALE: ${{ inputs.length_scale }}
  PACKAGE_MODE: ${{ inputs.package }}
  MAX_CHARS: ${{ inputs.max_chars }}
  START_CHAPTER: ${{ inputs.start }}
  CHAPTER_LIMIT: ${{ inputs.limit }}
  BATCH_SIZE: ${{ inputs.batch_size }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate job ID
        run: |
          [[ "$JOB_ID" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "Invalid job_id"; exit 2; }
          test -d "jobs/$JOB_ID" || { echo "Missing job directory"; exit 2; }
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg poppler-utils
          if [ "${{ inputs.install_calibre }}" = "true" ]; then
            sudo apt-get install -y --no-install-recommends calibre
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install Python dependencies
        run: pip install --requirement requirements.txt --requirement pipeline/requirements-pipeline.txt
      - name: Find ebook
        shell: bash
        run: |
          mapfile -d '' books < <(find "jobs/$JOB_ID" -maxdepth 1 -type f ! -name job.json -print0)
          [ "${#books[@]}" -eq 1 ] || { echo "Expected exactly one ebook, found ${#books[@]}"; exit 2; }
          printf 'EBOOK_PATH=%s\n' "${books[0]}" >> "$GITHUB_ENV"
      - name: Parse ebook
        run: |
          python pipeline/parse_ebook.py --input "$EBOOK_PATH" --out-dir chapters \
            --max-chars "$MAX_CHARS" --start "$START_CHAPTER" --limit "$CHAPTER_LIMIT"
      - name: Generate audiobook
        run: |
          python pipeline/batch_tts.py --chapters-dir chapters --out-dir release \
            --title "$BOOK_TITLE" --format "$AUDIO_FORMAT" --length-scale "$LENGTH_SCALE" \
            --package "$PACKAGE_MODE" --batch-size "$BATCH_SIZE"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release -maxdepth 1 -type f ! -name summary.json ! -name '*.sha256' -print0)
          [ "${#assets[@]}" -gt 0 ] || { echo "No output assets"; exit 3; }
          tag="audiobook-$JOB_ID"
          gh release create "$tag" "${assets[@]}" --title "Audiobook $BOOK_TITLE" --notes-file release/summary.json
      - name: Remove processed job
        if: success()
        run: |
          rm -rf "jobs/$JOB_ID"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add jobs
          if ! git diff --cached --quiet; then
            git commit -m "cleanup audiobook job $JOB_ID"
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
              sleep $((attempt * 2))
            done
            echo "Release succeeded, but job cleanup could not be pushed" >&2
            exit 1
          fi
