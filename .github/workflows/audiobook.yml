name: Continuous Ebook to Audiobook
run-name: Audiobook ${{ inputs.job_id }} attempt ${{ inputs.retry_count }}

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Job ID already stored under jobs/
        required: true
        type: string
      retry_count:
        description: Internal retry counter
        required: false
        default: "0"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: audiobook-${{ inputs.job_id }}
  cancel-in-progress: false

env:
  JOB_ID: ${{ inputs.job_id }}
  RETRY_COUNT: ${{ inputs.retry_count }}
  CONTINUOUS_BATCH_SIZE: "20"
  GH_TOKEN: ${{ github.token }}
  # Thong tin dang nhap Internet Archive (archive.org/account/s3.php)
  IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
  IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}

jobs:
  process-next-batch:
    runs-on: ubuntu-22.04
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate job
        shell: bash
        run: |
          [[ "$JOB_ID" =~ ^[A-Za-z0-9._-]+$ ]] || { echo "Invalid job ID"; exit 2; }
          test -n "$IA_ACCESS_KEY" || { echo "Missing IA_ACCESS_KEY secret"; exit 2; }
          test -n "$IA_SECRET_KEY" || { echo "Missing IA_SECRET_KEY secret"; exit 2; }
          test -f "jobs/$JOB_ID/job.json" || { echo "Missing job.json"; exit 2; }
          mapfile -d '' books < <(find "jobs/$JOB_ID" -maxdepth 1 -type f ! -name job.json ! -name progress.json -print0)
          [ "${#books[@]}" -eq 1 ] || { echo "Expected exactly one ebook"; exit 2; }
          printf 'EBOOK_PATH=%s\n' "${books[0]}" >> "$GITHUB_ENV"

      - name: Read format requirements
        id: options
        shell: bash
        run: |
          ext="${EBOOK_PATH##*.}"
          ext="${ext,,}"
          if [[ "$ext" =~ ^(mobi|azw|azw3|fb2|rtf|lit|pdb)$ ]]; then
            echo "calibre=true" >> "$GITHUB_OUTPUT"
          else
            echo "calibre=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg poppler-utils
          if [ "${{ steps.options.outputs.calibre }}" = "true" ]; then
            sudo apt-get install -y --no-install-recommends calibre
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: pip install --requirement requirements.txt --requirement pipeline/requirements-pipeline.txt

      - name: Plan next batch
        run: |
          python pipeline/continuous_job.py plan \
            --job-dir "jobs/$JOB_ID" --ebook "$EBOOK_PATH" \
            --parser pipeline/parse_ebook.py

      - name: Skip batch already on Internet Archive
        if: env.ALREADY_COMPLETE != 'true'
        shell: bash
        run: |
          # Moi batch (toi da 20 chuong) duoc GHEP thanh 1 file audio lien tuc,
          # dat ten theo dai chuong toan cuc: chuong_00001-00020.<ext>. Neu file
          # ghep cua batch da co tren item thi batch da upload xong -> bo qua
          # parse/synth/upload (idempotency).
          stem="chuong_$(printf '%05d-%05d' "$BATCH_START" "$BATCH_END")"
          echo "MERGE_STEM=$stem" >> "$GITHUB_ENV"
          existing="$(python pipeline/ia_upload.py find-batch \
            --identifier "$IA_IDENTIFIER" --prefix "${stem}.")"
          if [ -n "$existing" ]; then
            echo "Batch da co tren item (vd $existing) -> bo qua parse/synth/upload."
            echo "BATCH_ALREADY_UPLOADED=true" >> "$GITHUB_ENV"
          else
            echo "BATCH_ALREADY_UPLOADED=false" >> "$GITHUB_ENV"
          fi

      - name: Parse selected chapters
        if: env.ALREADY_COMPLETE != 'true' && env.BATCH_ALREADY_UPLOADED != 'true'
        run: |
          python pipeline/parse_ebook.py --input "$EBOOK_PATH" --out-dir chapters \
            --start "$BATCH_START" --limit "$BATCH_LIMIT"

      - name: Synthesize and merge batch
        if: env.ALREADY_COMPLETE != 'true' && env.BATCH_ALREADY_UPLOADED != 'true'
        run: |
          # Tong hop toi da 20 chuong roi GHEP thanh 1 file audio lien tuc,
          # dat ten theo dai chuong toan cuc ($MERGE_STEM, vd chuong_00001-00020).
          python pipeline/batch_tts.py --chapters-dir chapters --out-dir release \
            --title "$BOOK_TITLE" --format "$AUDIO_FORMAT" \
            --length-scale "$LENGTH_SCALE" --package merge \
            --merge-name "$MERGE_STEM" --batch-size 0

      - name: Upload merged audio to Internet Archive
        if: env.ALREADY_COMPLETE != 'true' && env.BATCH_ALREADY_UPLOADED != 'true'
        shell: bash
        run: |
          args=(pipeline/ia_upload.py upload-dir
            --identifier "$IA_IDENTIFIER"
            --dir release)
          if [ "$IA_FIRST_UPLOAD" = "true" ]; then
            args+=(--make-bucket
              --title "$BOOK_TITLE"
              --creator "$IA_CREATOR"
              --language "$IA_LANGUAGE"
              --description "Audiobook '$BOOK_TITLE' tao boi Piper TTS (giong Ngoc Huyen).")
          fi
          python "${args[@]}"
          rm -rf release chapters
          echo "Item: $IA_ITEM_URL"

      - name: Save checkpoint
        if: env.ALREADY_COMPLETE != 'true'
        run: |
          python pipeline/continuous_job.py advance --job-dir "jobs/$JOB_ID" \
            --start "$BATCH_START" --end "$BATCH_END" \
            --asset "chuong_${BATCH_START}-${BATCH_END}"

      - name: Push checkpoint
        if: env.ALREADY_COMPLETE != 'true'
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "jobs/$JOB_ID/progress.json"
          git commit -m "audiobook $JOB_ID: checkpoint through chapter $BATCH_END" || true
          for attempt in 1 2 3 4; do
            git pull --rebase --autostash origin "$GITHUB_REF_NAME" && git push && exit 0
            sleep $((attempt * 5))
          done
          exit 1

      - name: Dispatch next batch
        if: env.JOB_COMPLETE == 'false'
        run: |
          gh workflow run audiobook.yml --ref "$GITHUB_REF_NAME" \
            -f job_id="$JOB_ID" -f retry_count=0

      - name: Finalize Internet Archive item
        if: env.JOB_COMPLETE == 'true' || env.ALREADY_COMPLETE == 'true'
        shell: bash
        run: |
          python pipeline/ia_upload.py finalize \
            --identifier "$IA_IDENTIFIER" \
            --progress "jobs/$JOB_ID/progress.json"
          echo "Audiobook hoan tat: $IA_ITEM_URL"

      - name: Clean completed job
        if: env.JOB_COMPLETE == 'true' || env.ALREADY_COMPLETE == 'true'
        shell: bash
        run: |
          rm -rf "jobs/$JOB_ID"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add jobs
          git commit -m "audiobook $JOB_ID: complete" || exit 0
          for attempt in 1 2 3 4; do
            git pull --rebase --autostash origin "$GITHUB_REF_NAME" && git push && exit 0
            sleep $((attempt * 5))
          done
          echo "Job is complete; deferred repository cleanup" >&2

      - name: Retry failed batch automatically
        if: failure()
        shell: bash
        run: |
          retry="${RETRY_COUNT:-0}"
          [[ "$retry" =~ ^[0-9]+$ ]] || retry=0
          if [ "$retry" -lt 3 ]; then
            next=$((retry + 1))
            gh workflow run audiobook.yml --ref "$GITHUB_REF_NAME" \
              -f job_id="$JOB_ID" -f retry_count="$next"
            echo "Dispatched automatic retry $next/3"
          else
            echo "Batch failed after 3 retries" >&2
          fi
