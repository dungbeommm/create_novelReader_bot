name: Telegram Bot (chay tren GitHub theo lich)

# Bot chay trong GitHub Actions: khong can may/VPS, khong can PAT ca nhan.
# CHE DO CHAY LIEN TUC: moi luot chay poll lien tuc (long-poll, tra loi gan nhu
# tuc thi) trong ~5h40m roi thoat. Cron */5 + concurrency dam bao luon co san 1
# luot dang xep hang de tiep quan ngay khi luot truoc ket thuc => chay ~24/7.
# Ban chi can bam "Run workflow" 1 lan dau; sau do no tu duy tri.
#
# CAN cau hinh 1 secret trong repo:
#   Settings > Secrets and variables > Actions > New repository secret
#     TELEGRAM_BOT_TOKEN = <token bot tu @BotFather>
#   (Tuy chon) ALLOWED_USER_IDS = <danh sach user id, ngan cach dau phay>

on:
  schedule:
    - cron: "*/5 * * * *"   # dong vai tro "nguoi tiep quan": luon xep san 1 luot ke tiep
  workflow_dispatch: {}      # bam chay ngay lan dau

# Khong cho 2 lan poll chay chong len nhau.
concurrency:
  group: telegram-bot
  cancel-in-progress: false

permissions:
  contents: write   # de tao Release + commit lai state

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # gan sat gioi han 6h cua GitHub Actions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cai goi he thong (espeak-ng, ffmpeg, poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg poppler-utils

      - name: Cai Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r pipeline/requirements-pipeline.txt
          pip install -r bot/requirements-bot.txt

      - name: Chay bot (che do chay lien tuc)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ALLOWED_USER_IDS: ${{ secrets.ALLOWED_USER_IDS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_RUNTIME_SEC: "20400"   # ~5h40m roi thoat de luot ke tiep tiep quan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python bot/bot_poll.py --loop
