# Audiobook Forge default configuration.
#
# Every value here can be overridden via environment variables (see .env.example)
# or by pointing AUDIOBOOK_FORGE_CONFIG at another YAML file. Nothing is
# hard-coded in the source; this file is the single source of truth for defaults.
#
# Keys mirror the Pydantic models in src/audiobook_forge/config/models.py exactly
# (the Settings model uses extra="forbid", so unknown keys are rejected).

app_name: Audiobook Forge
log_level: INFO
work_dir: work
output_dir: out

tts:
  models_dir: models
  default_voice: null        # null => first voice found alphabetically
  speed: 1.0                 # length_scale (higher = slower)
  noise_scale: 0.667
  noise_w: 0.8
  sentence_silence: 0.35
  allowed_speeds: [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3, 1.5]

segmentation:
  max_chars: 320             # hard character cap per segment (>= 80)
  soft_chars: 220            # preferred size; flush at sentence end past this
  max_tokens: 180            # approximate whitespace-token cap per segment
  overlap_sentences: 0       # sentence overlap between consecutive segments
  min_chars: 20              # drop segments shorter than this after trim

normalization:
  unicode_form: NFC
  strip_html: true
  strip_markdown: true
  strip_bbcode: true
  decode_html_entities: true
  remove_emoji: true
  collapse_whitespace: true
  normalize_punctuation: true
  language: vi
  expand_vietnamese: true
  extra_rules: []            # dotted import paths of custom Rule callables

audio:
  format: mp3
  bitrate: 128
  sample_rate: 22050
  channels: 1
  merge_mode: per_chapter    # or "single"
  normalize_volume: true
  loudness_target_i: -16.0
  loudness_tp: -1.5
  loudness_lra: 11.0
  trim_silence: true
  silence_threshold_db: -45.0
  silence_min_duration: 0.6
  noise_reduction: false
  allowed_formats: [mp3, wav, opus, m4a, aac]
  allowed_bitrates: [64, 96, 128, 192, 256, 320]
  allowed_sample_rates: [22050, 24000, 44100, 48000]

cache:
  enabled: true
  dir: .cache/audio
  hash_algorithm: sha256

queue:
  dir: state/queue
  max_concurrent: 1
  max_history: 200

release:
  zip_threshold: 100         # zip outputs when file count >= this
  include_log: true
  include_cover: true
  include_playlist: true
  tag_prefix: audiobook
  draft: false
  prerelease: false

compression:
  enabled: false
  format: zip
  level: 6

github:
  repository: ""             # owner/name; usually from GITHUB_REPOSITORY
  workflow_file: convert.yml
  ref: main
  api_url: https://api.github.com
  intake_tag_prefix: inbox
  runner_time_budget_seconds: 18000   # ~5h; leaves headroom under the 6h cap

telegram:
  allowed_user_ids: []       # empty => allow everyone (set IDs for private bots)
  max_upload_mb: 45
  media_group_wait_seconds: 2.0
  default_language: vi
