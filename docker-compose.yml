# Runs the always-on Telegram bot. Heavy conversion happens on GitHub Actions,
# so this container stays light (low RAM/CPU) and can run on any small host.
#
# Secrets are passed via environment / .env and never baked into the image.

services:
  bot:
    build: .
    image: audiobook-forge:latest
    container_name: audiobook-forge-bot
    restart: unless-stopped
    command: ["bot"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set in .env}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:?set in .env}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:?set in .env}
      GITHUB_WORKFLOW_FILE: ${GITHUB_WORKFLOW_FILE:-convert.yml}
      GITHUB_REF: ${GITHUB_REF:-main}
      AUDIOBOOK_FORGE_CONFIG: ${AUDIOBOOK_FORGE_CONFIG:-config/default.yaml}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./models:/app/models:ro
      - forge-work:/app/.work
      - forge-queue:/app/.queue

volumes:
  forge-work:
  forge-queue:
